<!DOCTYPE html>
<html>
<head>
    <title>Log In — Scholarship Portal</title>

    <!--
        Same Google Fonts as the rest of our app
        so everything looks consistent
    -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>

        /*
            =============================================
            GLOBAL RESET
            Remove default browser spacing and use
            border-box sizing everywhere
            =============================================
        */
        * {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /*
            =============================================
            BODY
            Same soft blue background as the rest
            of the app. Flex centering puts the login
            card perfectly in the middle of the screen.
            =============================================
        */
        body {
            background-color: #f0f4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /*
            =============================================
            LOGIN CARD
            The white box that holds the whole form.
            Same style as the signup card so the app
            feels consistent everywhere.
            =============================================
        */
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        /* Title at the top of the card */
        .login-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b3b98;
            text-align: center;
            margin-bottom: 8px;
        }

        /* Subtitle under the title */
        .login-card p {
            text-align: center;
            color: #888;
            font-size: 0.88rem;
            margin-bottom: 30px;
        }

        /*
            =============================================
            FORM GROUP
            Each input has a label above it.
            We wrap both in a div to keep them together
            and add spacing between each pair.
            =============================================
        */
        .form-group {
            margin-bottom: 20px;
        }

        /* Label above each input like "Email" or "Password" */
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #3b3b98;
            margin-bottom: 6px;
        }

        /* The input fields where the user types */
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0ff;
            border-radius: 10px;
            font-size: 0.88rem;
            font-family: 'Poppins', sans-serif;
            color: #2d2d2d;
            transition: border 0.2s;
        }

        /* Purple border when the user clicks on an input */
        .form-group input:focus {
            outline: none;
            border-color: #6c63ff;
        }

        /*
            =============================================
            LOGIN BUTTON
            Full width purple button, same style
            as the signup button and filter button
            =============================================
        */
        .btn {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        /* Darker purple on hover */
        .btn:hover {
            background: #574fd6;
        }

        /*
            =============================================
            MESSAGE
            Shows friendly error messages like
            "wrong password" or "email not found"
            Orange background — gentle warning color
            =============================================
        */
        .message {
            background: #fff4e0;
            color: #f59e0b;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
        }

        /*
            =============================================
            SIGNUP LINK
            At the bottom — "Don't have an account?
            Sign up" so the user can switch easily
            =============================================
        */
        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
        }

        /* The clickable "Sign up" link */
        .signup-link a {
            color: #6c63ff;
            font-weight: 600;
            text-decoration: none;
        }

        /* Underline on hover so it feels clickable */
        .signup-link a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <!--
        =============================================
        LOGIN CARD
        The whole form lives inside this white box
        =============================================
    -->
    <div class="login-card">

        <!-- Title and subtitle -->
        <h1>👋 Welcome Back</h1>
        <p>Log in to track your scholarships</p>

        <!--
            If Flask sent a message (like "wrong password"),
            show it here. Only appears when message exists.
        -->
        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        <!--
            =============================================
            LOGIN FORM
            method="POST" sends data securely
            action="/login" sends it to login_post()
            in Flask
            =============================================
        -->
        <form method="POST" action="/login">

            <!--
                EMAIL FIELD
                type="email" validates it looks like
                an email automatically.
                Flask reads it with:
                request.form.get("email")
            -->
            <div class="form-group">
                <label>📧 Email</label>
                <input
                    type="email"
                    name="email"
                    placeholder="you@gmail.com"
                    required
                >
            </div>

            <!--
                PASSWORD FIELD
                type="password" hides the text as dots.
                Flask reads it with:
                request.form.get("password")
            -->
            <div class="form-group">
                <label>🔒 Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="your password"
                    required
                >
            </div>

            <!--
                SUBMIT BUTTON
                Clicking this sends the form to Flask.
                Flask checks the email and password
                and creates a session if correct.
            -->
            <button type="submit" class="btn">Log In →</button>

        </form>

        <!--
            Link to signup page for users who
            don't have an account yet
        -->
        <div class="signup-link">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>

    </div>

</body>
</html>

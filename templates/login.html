<!DOCTYPE html>
<html>
<head>
    <title>Log In — Scholarship Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f0f4ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .login-card h1 { font-size: 1.8rem; font-weight: 700; color: #3b3b98; text-align: center; margin-bottom: 8px; }
        .login-card p { text-align: center; color: #888; font-size: 0.88rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #3b3b98; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0ff; border-radius: 10px; font-size: 0.88rem; font-family: 'Poppins', sans-serif; color: #2d2d2d; transition: border 0.2s; }
        .form-group input:focus { outline: none; border-color: #6c63ff; }
        .btn { width: 100%; padding: 12px; background: #6c63ff; color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn:hover { background: #574fd6; }
        .message { background: #fff4e0; color: #f59e0b; border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; margin-bottom: 20px; text-align: center; }
        .signup-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #888; }
        .signup-link a { color: #6c63ff; font-weight: 600; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>👋 Welcome Back</h1>
        <p>Log in to track your scholarships</p>

        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" placeholder="you@gmail.com" required>
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="your password" required>
            </div>
            <button type="submit" class="btn">Log In →</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </div>
</body>
</html>
